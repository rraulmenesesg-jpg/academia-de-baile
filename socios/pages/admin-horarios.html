<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Horarios | Funny Dance</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase.js"></script>
  <script src="../js/guard.js"></script>
  <script src="../js/auth.js"></script>
</head>

<!-- guard.js verifica que sea admin o super_chambelan -->
<body class="bg-dark text-light" data-requires-rol="admin,super_chambelan">

  <header class="bg-primary text-white text-center py-4">
    <h1 class="mb-1">Panel de Administración</h1>
    <small id="rol-badge" class="badge bg-info text-dark"></small>
    <br>
    <button class="btn btn-outline-light btn-sm mt-2" onclick="logout()">Cerrar Sesión</button>
  </header>

  <div class="container my-5">

    <ul class="nav nav-tabs nav-fill mb-4" id="adminTabs" role="tablist">

      <li class="nav-item" role="presentation">
        <button class="nav-link active" id="chambelanes-tab"
                data-bs-toggle="tab" data-bs-target="#chambelanes" type="button" role="tab">
          Horario Chambelanes
        </button>
      </li>

      <li class="nav-item" role="presentation">
        <button class="nav-link" id="clases-tab"
                data-bs-toggle="tab" data-bs-target="#clases" type="button" role="tab">
          Clases Públicas
        </button>
      </li>

      <!-- Solo visible para admin -->
      <li class="nav-item d-none" id="tab-registro" role="presentation">
        <button class="nav-link" id="registro-tab"
                data-bs-toggle="tab" data-bs-target="#registro" type="button" role="tab">
          ➕ Registrar Chambelán
        </button>
      </li>

    </ul>

    <div class="tab-content" id="adminTabContent">

      <!-- Pestaña 1: Chambelanes -->
      <div class="tab-pane fade show active" id="chambelanes" role="tabpanel">
        <h3 class="text-center mb-4 text-info">Horario de Quinceañeras y Chambelanes</h3>
        <div id="grid-chambelanes"></div>
      </div>

      <!-- Pestaña 2: Clases Públicas -->
      <div class="tab-pane fade" id="clases" role="tabpanel">
        <h3 class="text-center mb-4 text-info">Horario de Clases Regulares</h3>
        <div id="grid-clases"></div>
      </div>

      <!-- Pestaña 3: Registro (solo admin) -->
      <div class="tab-pane fade" id="registro" role="tabpanel">
        <div class="row justify-content-center mt-4">
          <div class="col-md-5">
            <div class="card bg-secondary text-light border-0 shadow">
              <div class="card-body p-4">
                <h4 class="mb-4 text-center">Registrar nuevo chambelán</h4>

                <div class="mb-3">
                  <label class="form-label">Nombre</label>
                  <input type="text" id="reg-nombre" class="form-control bg-dark text-light border-secondary"
                         placeholder="Nombre completo">
                </div>
                <div class="mb-3">
                  <label class="form-label">Correo electrónico</label>
                  <input type="email" id="reg-email" class="form-control bg-dark text-light border-secondary"
                         placeholder="correo@ejemplo.com">
                </div>
                <div class="mb-3">
                  <label class="form-label">Contraseña temporal</label>
                  <input type="password" id="reg-password" class="form-control bg-dark text-light border-secondary"
                         placeholder="Mínimo 6 caracteres">
                </div>
                <div class="mb-4">
                  <label class="form-label">Rol</label>
                  <select id="reg-rol" class="form-select bg-dark text-light border-secondary">
                    <option value="chambelan">Chambelán</option>
                    <option value="super_chambelan">Super Chambelán</option>
                  </select>
                </div>

                <button class="btn btn-info w-100 fw-bold" onclick="registrarChambelan()">
                  Crear cuenta
                </button>
                <p id="reg-mensaje" class="text-center mt-3 small"></p>
              </div>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- Botón flotante + -->
  <button class="btn-nuevo position-fixed bottom-0 end-0 m-4 rounded-circle shadow-lg"
          onclick="abrirModalNuevo()">
    <span class="fs-3">+</span>
  </button>

  <!-- Modal Bootstrap -->
  <div class="modal fade" id="eventoModal" tabindex="-1" aria-labelledby="modalTitle" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content bg-dark text-light border-0">
        <div class="modal-header border-secondary">
          <h5 class="modal-title" id="modalTitle">Nuevo Evento</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">

          <div class="mb-3">
            <label class="form-label">Día</label>
            <select id="modalDia" class="form-select bg-secondary text-light">
              <option>Lunes</option><option>Martes</option><option>Miércoles</option>
              <option>Jueves</option><option>Viernes</option>
            </select>
          </div>

          <div class="mb-3">
            <label class="form-label">Hora de inicio</label>
            <select id="modalHora" class="form-select bg-secondary text-light">
              <option value="1:00">1:00 - 2:30</option>
              <option value="2:30">2:30 - 4:00</option>
              <option value="4:00">4:00 - 5:30</option>
              <option value="5:30">5:30 - 7:00</option>
              <option value="7:00">7:00 - 8:30</option>
              <option value="8:30">8:30 - 9:30</option>
            </select>
          </div>

          <!-- Campos chambelanes -->
          <div id="grupoChambelanes" class="mb-3">
            <label class="form-label">Quinceañera</label>
            <input type="text" id="modalQuinceanera" class="form-control bg-secondary text-light"
                   placeholder="Nombre de la quinceañera">
          </div>
          <div id="grupoChambelanes2" class="mb-3">
            <label class="form-label">Chambelán asignado</label>
            <select id="modalChambelan" class="form-select bg-secondary text-light">
              <option value="">-- Sin asignar --</option>
            </select>
          </div>

          <!-- Campos clases públicas -->
          <div id="grupoClases" class="mb-3 d-none">
            <label class="form-label">Nombre de la clase</label>
            <input type="text" id="modalNombreClase" class="form-control bg-secondary text-light"
                   placeholder="Ej: Clase Intermedio, F.D. Kits...">
          </div>

          <div class="mb-3">
            <label class="form-label">Sede (opcional)</label>
            <input type="text" id="modalSede" class="form-control bg-secondary text-light"
                   placeholder="Axapusco, Santa María...">
          </div>
          <div class="mb-3">
            <label class="form-label">Notas (opcional)</label>
            <textarea id="modalNotas" class="form-control bg-secondary text-light" rows="2"
                      placeholder="Detalles adicionales..."></textarea>
          </div>

        </div>
        <div class="modal-footer border-0">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="button" class="btn btn-info" onclick="guardarEvento()">Guardar</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/horario-admin.js"></script>

  <script>
    // Mostrar badge con el rol del usuario logueado
    (async () => {
      const { data: { user } } = await supabaseClient.auth.getUser();
      if (!user) return;
      const { data: p } = await supabaseClient.from('usuarios').select('rol,nombre').eq('id', user.id).single();
      if (p) {
        document.getElementById('rol-badge').textContent =
          (p.nombre || user.email) + ' · ' + p.rol;
      }
    })();

    // Registrar chambelán (solo admin)
    async function registrarChambelan() {
      const nombre   = document.getElementById('reg-nombre').value.trim();
      const email    = document.getElementById('reg-email').value.trim();
      const password = document.getElementById('reg-password').value;
      const rol      = document.getElementById('reg-rol').value;
      const msg      = document.getElementById('reg-mensaje');

      if (!nombre || !email || !password) {
        msg.style.color = '#e74c3c';
        msg.textContent = 'Todos los campos son obligatorios';
        return;
      }
      if (password.length < 6) {
        msg.style.color = '#e74c3c';
        msg.textContent = 'La contraseña debe tener al menos 6 caracteres';
        return;
      }

      msg.style.color = '#aaa';
      msg.textContent = 'Creando cuenta...';

      // Crear usuario en Auth
      const { data, error } = await supabaseClient.auth.signUp({
        email, password,
        options: { data: { nombre, rol } }   // el trigger los toma de aquí
      });

      if (error) {
        msg.style.color = '#e74c3c';
        msg.textContent = 'Error: ' + error.message;
        return;
      }

      // Si el trigger no corrió (usuario ya existía en auth sin fila en usuarios),
      // insertar manualmente
      if (data.user) {
        await supabaseClient.from('usuarios').upsert({
          id: data.user.id, email, nombre, rol
        }, { onConflict: 'id' });
      }

      msg.style.color = '#00f5d4';
      msg.textContent = '✓ Cuenta creada para ' + email;
      document.getElementById('reg-nombre').value    = '';
      document.getElementById('reg-email').value     = '';
      document.getElementById('reg-password').value  = '';

      // Refrescar lista de chambelanes en el select del modal
      await cargarListaChambelanes();
    }
  </script>

</body>
</html>
