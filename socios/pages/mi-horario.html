<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Horario | Funny Dance</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase.js"></script>
  <script src="../js/guard.js"></script>
  <script src="../js/auth.js"></script>
</head>

<body data-requires-rol="chambelan,super_chambelan,admin">

  <header class="bg-primary text-white text-center py-4">
    <h1>Mi Horario</h1>
    <small id="nombre-badge" class="badge bg-info text-dark"></small>
    <br>
    <button class="btn btn-outline-light btn-sm mt-2" onclick="logout()">Cerrar Sesión</button>
  </header>

  <div class="container my-4">
    <div id="horario-container">
      <p class="text-center text-muted mt-5">Cargando tu horario...</p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/horario-chambelan.js"></script>
