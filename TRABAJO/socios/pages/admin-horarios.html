<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Horarios</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Tus estilos -->
  <link rel="stylesheet" href="../css/styles.css">

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase.js"></script>
  <script src="../js/guard.js"></script>
  <script src="../js/auth.js"></script>
</head>

<body class="bg-dark text-light">

  <header class="bg-primary text-white text-center py-4">
    <h1>Panel de Administración</h1>
    <button class="btn btn-outline-light mt-2" onclick="logout()">Cerrar Sesión</button>
  </header>

  <div class="container my-5">

    <!-- Pestañas Bootstrap -->
    <ul class="nav nav-tabs nav-fill mb-4" id="adminTabs" role="tablist">
      <li class="nav-item" role="presentation">
        <button class="nav-link active" id="chambelanes-tab" data-bs-toggle="tab" data-bs-target="#chambelanes" type="button" role="tab">
          Horario Chambelanes
        </button>
      </li>
      <li class="nav-item" role="presentation">
        <button class="nav-link" id="clases-tab" data-bs-toggle="tab" data-bs-target="#clases" type="button" role="tab">
          Horario Clases Públicas
        </button>
      </li>
    </ul>

    <div class="tab-content" id="adminTabContent">

      <!-- Pestaña 1: Chambelanes -->
      <div class="tab-pane fade show active" id="chambelanes" role="tabpanel">
        <h3 class="text-center mb-4 text-info">Horario de Quinceañeras y Chambelanes</h3>
        <div id="grid-chambelanes" class="horario"></div>
      </div>

      <!-- Pestaña 2: Clases Públicas -->
      <div class="tab-pane fade" id="clases" role="tabpanel">
        <h3 class="text-center mb-4 text-info">Horario de Clases Regulares</h3>
        <div id="grid-clases" class="horario"></div>
      </div>

    </div>
  </div>

  <!-- Botón flotante + -->
  <button class="btn-nuevo position-fixed bottom-0 end-0 m-4 rounded-circle shadow-lg" onclick="abrirModalNuevo()">
    <span class="fs-3">+</span>
  </button>

  <!-- Modal único (Bootstrap) -->
  <div class="modal fade" id="eventoModal" tabindex="-1" aria-labelledby="modalTitle" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content bg-dark text-light border-0">
        <div class="modal-header border-secondary">
          <h5 class="modal-title" id="modalTitle">Nuevo Evento</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <!-- Campos comunes -->
          <div class="mb-3">
            <label class="form-label">Día</label>
            <select id="modalDia" class="form-select bg-secondary text-light">
              <option>Lunes</option><option>Martes</option><option>Miércoles</option><option>Jueves</option><option>Viernes</option>
            </select>
          </div>

          <div class="mb-3">
            <label class="form-label">Hora de inicio</label>
            <select id="modalHora" class="form-select bg-secondary text-light">
              <option value="1:00">1:00 - 2:30</option>
              <option value="2:30">2:30 - 4:00</option>
              <option value="4:00">4:00 - 5:30</option>
              <option value="5:30">5:30 - 7:00</option>
              <option value="7:00">7:00 - 8:30</option>
              <option value="8:30">8:30 - 9:30</option>
            </select>
          </div>

          <!-- Campos chambelanes -->
          <div id="grupoChambelanes" class="mb-3">
            <label class="form-label">Quinceañera</label>
            <input type="text" id="modalQuinceanera" class="form-control bg-secondary text-light" placeholder="Nombre de la quinceañera">
          </div>

          <div id="grupoChambelanes2" class="mb-3">
            <label class="form-label">Chambelán asignado</label>
            <select id="modalChambelan" class="form-select bg-secondary text-light">
              <option value="">-- Sin asignar --</option>
            </select>
          </div>

          <!-- Campos clases públicas -->
          <div id="grupoClases" class="mb-3 d-none">
            <label class="form-label">Nombre de la clase</label>
            <input type="text" id="modalNombreClase" class="form-control bg-secondary text-light" placeholder="Ej: Clase Intermedio, F.D. Kits...">
          </div>

          <!-- Campos comunes finales -->
          <div class="mb-3">
            <label class="form-label">Sede (opcional)</label>
            <input type="text" id="modalSede" class="form-control bg-secondary text-light" placeholder="Axapusco, Santa María...">
          </div>

          <div class="mb-3">
            <label class="form-label">Notas (opcional)</label>
            <textarea id="modalNotas" class="form-control bg-secondary text-light" rows="3" placeholder="Detalles adicionales..."></textarea>
          </div>
        </div>
        <div class="modal-footer border-0">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="button" class="btn btn-info" onclick="guardarEvento()">Guardar</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <!-- ← Aquí va tu JS antiguo (el que tenías antes de FullCalendar) -->
  <script src="../js/horario-admin.js"></script>

</body>
</html>
