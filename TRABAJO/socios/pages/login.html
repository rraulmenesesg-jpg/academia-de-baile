<!DOCTYPE html>
<html lang="es-mx">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="assets/ICON.png">
  <title>Iniciar Sesión</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase.js"></script>
  <script src="../js/auth.js"></script>
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
  <div class="background-radial">
    <div class="login-card">
      <div class="avatar-container">
        <div class="avatar-icon">👤</div>
      </div>
      
      <h2>Quien Eres ?</h2>
      
      <form id="loginForm" onsubmit="event.preventDefault(); login(document.getElementById('email').value, document.getElementById('password').value);">
        <div class="input-group">
          <span class="icon">👤</span>
          <input id="email" type="email" placeholder="Gmail" autocomplete="email" required>
        </div>
        
        <div class="input-group">
          <span class="icon">🔒</span>
          <input id="password" type="password" placeholder="Conraseña" autocomplete="current-password" required>
        </div>
        
        <button type="submit" class="login-btn">Entrar</button>
        
        <div class="extra-options">
          <label class="remember-me">
            <input type="checkbox"> recuerdame
          </label>
          <a href="#" class="forgot-pass">Olvide la Contraseña</a>
        </div>
      </form>

      <div class="footer-link">
      </div>
    </div>
  </div>
</body>
</html>
